<div class="container-fluid py-3">
  <div class="row">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Nuevo modulo de consulta</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="submit()">
            <div class="mb-3">
              <label for="tcode" class="form-label">TCode</label>
              <select id="tcode" class="form-select" name="tcode" [(ngModel)]="selectedTcode">
                <option value="mb51">MB51</option>
                <option value="me2l">ME2L</option>
              </select>
            </div>

            <div class="form-check mb-3">
              <input
                id="useSpecificDateRange"
                class="form-check-input"
                type="checkbox"
                name="useSpecificDateRange"
                [(ngModel)]="useSpecificDateRange"
                (change)="onDateModeChange()"
              />
              <label for="useSpecificDateRange" class="form-check-label">
                Usar rango de fechas especifico (dia, mes y anio)
              </label>
            </div>

            <div *ngIf="!useSpecificDateRange" class="row g-3 mb-3">
              <div class="col-12 col-md-6">
                <label for="fromYear" class="form-label">Desde anio</label>
                <input
                  id="fromYear"
                  class="form-control"
                  type="number"
                  min="1900"
                  max="2100"
                  name="fromYear"
                  [(ngModel)]="fromYear"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="toYear" class="form-label">Hasta anio</label>
                <input
                  id="toYear"
                  class="form-control"
                  type="number"
                  min="1900"
                  max="2100"
                  name="toYear"
                  [(ngModel)]="toYear"
                />
              </div>
            </div>

            <div *ngIf="useSpecificDateRange" class="row g-3 mb-3">
              <div class="col-12 col-md-6">
                <label for="fromDate" class="form-label">Fecha desde</label>
                <input
                  id="fromDate"
                  class="form-control"
                  type="date"
                  name="fromDate"
                  [(ngModel)]="fromDate"
                />
              </div>
              <div class="col-12 col-md-6">
                <label for="toDate" class="form-label">Fecha hasta</label>
                <input
                  id="toDate"
                  class="form-control"
                  type="date"
                  name="toDate"
                  [(ngModel)]="toDate"
                />
              </div>
            </div>

            <button type="submit" class="btn btn-primary">
              Continuar
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="submitted" class="row mt-3">
    <div class="col-12 col-lg-8">
      <div class="alert alert-success mb-0">
        <strong>Formulario listo:</strong>
        TCode: {{ selectedTcode | uppercase }}.
        <span *ngIf="!useSpecificDateRange">
          Rango por anio: {{ fromYear }} - {{ toYear }}.
        </span>
        <span *ngIf="useSpecificDateRange">
          Rango especifico: {{ fromDate || 'sin fecha inicial' }} - {{ toDate || 'sin fecha final' }}.
        </span>
      </div>
    </div>
  </div>
</div>
